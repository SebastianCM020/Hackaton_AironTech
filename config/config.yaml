data:
  raw_path: "data/raw/dengue_ecuador_sintetico.csv"
  processed_path: "data/processed/"

models:
  random_forest:
    n_estimators: 200
    max_depth: 10
    min_samples_split: 5
    min_samples_leaf: 2
    random_state: 42
    n_jobs: -1
  xgboost:
    n_estimators: 200
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
  lightgbm:
    n_estimators: 200
    max_depth: 6
    learning_rate: 0.05
    num_leaves: 31
    subsample: 0.8
    random_state: 42

features:
  numeric_cols:
    - temperatura_promedio
    - precipitacion_mm
    - casos_semana_anterior
    - casos_acumulados_mes
    - indice_aedes
    - altitud_msnm
    - densidad_poblacional
    - cobertura_salud
    - semana_epidemiologica
    - year
  categorical_cols:
    - provincia
  target_classification: brote
  target_multiclass: nivel_riesgo
  target_regression: casos_dengue

training:
  test_size: 0.2
  random_state: 42
  cv_folds: 5
